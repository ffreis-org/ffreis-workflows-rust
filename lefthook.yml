remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: 1b2afe64334b4aff11c7e3ebc5fa964041efa3b3
    configs:
      - lefthook/base.yml
      - lefthook/actionlint.yml

# fmt-check targets examples/ only — overrides the rust.yml default
pre-commit:
  commands:
    fmt-check:
      glob: "examples/**/*.rs"
      run: make fmt-check

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    actionlint:
      run: actionlint
