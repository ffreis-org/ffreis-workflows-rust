# lefthook.yml — Rust quality hooks
# pre-commit: fast (<20 s) — fmt check + hygiene + secrets
# pre-push:   deeper (<90 s) — actionlint on workflows + clippy on examples

pre-commit:
  parallel: true
  commands:
    hygiene-merge-markers:
      run: ./scripts/hooks/check_merge_markers.sh
    hygiene-large-files:
      run: ./scripts/hooks/check_large_files.sh
    hygiene-binary-files:
      run: ./scripts/hooks/check_binary_files.sh
    fmt-check:
      glob: "examples/**/*.rs"
      run: make fmt-check
    secret-scan:
      run: make secrets-scan-staged
    actionlint:
      run: actionlint

    agents-drift-hint:
      run: |
        changed=$(git diff --cached --name-only 2>/dev/null)
        if echo "$changed" | grep -qE '\.(go|py|rs|tf)$' && \
           ! echo "$changed" | grep -q 'AGENTS\.md'; then
          echo "hint: source files changed — check if AGENTS.md needs updating" >&2
        fi
        exit 0

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    actionlint:
      run: actionlint

commit-msg:
  commands:
    conventional-commits:
      run: ./scripts/hooks/check_commit_msg.sh {1}
