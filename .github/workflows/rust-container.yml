name: Rust Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Name (and optional tag) for the built container image"
        type: string
        required: true
      containerfile:
        description: "Path to the Containerfile (or Dockerfile) relative to context"
        type: string
        default: "Containerfile"
      context:
        description: "Build context path"
        type: string
        default: "."
      build-args:
        description: "Extra --build-arg flags passed to the container build command"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  container:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect container runtime
        id: runtime
        run: |
          set -euo pipefail
          if command -v podman &>/dev/null; then
            echo "tool=podman" >> "$GITHUB_OUTPUT"
          elif command -v docker &>/dev/null; then
            echo "tool=docker" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Neither podman nor docker found on this runner."
            exit 1
          fi
          runtime_tool="$(grep -E '^tool=' "$GITHUB_OUTPUT" | cut -d= -f2)"
          echo "Container runtime: ${runtime_tool}"

      - name: Build container image
        env:
          TOOL: ${{ steps.runtime.outputs.tool }}
          BUILD_ARGS: ${{ inputs.build-args }}
          CONTEXT: ${{ inputs.context }}
          CONTAINERFILE: ${{ inputs.containerfile }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          set -euo pipefail
          read -r -a build_args_arr <<< "${BUILD_ARGS:-}"
          "$TOOL" build \
            --file "${GITHUB_WORKSPACE}/${CONTEXT}/${CONTAINERFILE}" \
            --tag "$IMAGE_NAME" \
            "${build_args_arr[@]}" \
            "$CONTEXT"

      - name: Smoke-test container image
        env:
          TOOL: ${{ steps.runtime.outputs.tool }}
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          set -euo pipefail
          echo "Verifying image '$IMAGE_NAME' exists locally..."
          "$TOOL" image inspect "$IMAGE_NAME" > /dev/null
          echo "Image smoke-test passed."
