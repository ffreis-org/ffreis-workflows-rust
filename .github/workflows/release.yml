# Workflow: release-please for aggregator
# This workflow enables automatic releases using release-please for this workflow aggregator repo.

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      dry-run: false
      config-file: .release-please-config.json
      manifest-file: .release-please-manifest.json
      target-branch: main
