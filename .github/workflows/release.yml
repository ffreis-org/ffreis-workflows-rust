# Workflow: release-please for aggregator
# This workflow enables automatic releases using release-please for this workflow aggregator repo.

name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@2c051eb6d9aa5ecea3e969d7e2fd2b4e21a002d6 # v1.0.1
    with:
      dry-run: false
      config-file: .release-please-config.json
      manifest-file: .release-please-manifest.json
      target-branch: main
