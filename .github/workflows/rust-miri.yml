name: Rust Miri (Undefined Behavior Detection)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      miri-args:
        description: "Extra arguments passed to cargo miri test"
        type: string
        default: "--all-features"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 60
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      cargo-build-jobs:
        description: >-
          Caps CARGO_BUILD_JOBS (parallel rustc compile units). Default "4"
          matches the workspace Makefile convention — memory-safe on a
          4.5Gi-limited self-hosted runner pod. Hosted-runner callers wanting
          full parallelism can pass a higher value (e.g. the runner's core
          count).
        type: string
        default: "4"
    secrets:
      PRIVATE_DEPS_TOKEN:
        description: "Token with read access to private git-dependency repos (e.g. FLEET_READ_TOKEN). Optional — omit if the workspace has no private cargo git deps."
        required: false

jobs:
  miri:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    env:
      CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure git for private cargo dependencies
        env:
          PRIVATE_DEPS_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "$PRIVATE_DEPS_TOKEN" ]]; then
            git config --global url."https://x-access-token:${PRIVATE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"
            # cargo's libgit2 backend does not reliably honor url.insteadOf
            # credential rewriting; force it to shell out to system git,
            # which does.
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          fi

      - name: Install Rust (nightly + miri)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: nightly
          components: miri

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Set up Miri
        run: |
          set -euo pipefail
          cargo miri setup

      - name: Run Miri tests
        env:
          MIRI_ARGS: ${{ inputs.miri-args }}
        run: |
          set -euo pipefail
          read -r -a miri_args_arr <<< "${MIRI_ARGS:-}"
          cargo miri test "${miri_args_arr[@]}"
