name: Rust Test

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      test-args:
        description: "Extra arguments passed to the test runner"
        type: string
        default: "--all-features"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 30
      nextest:
        description: >-
          Use cargo-nextest instead of `cargo test`. Faster and better
          parallelized; doctests are run separately via `cargo test --doc`
          (nextest does not run doctests). Opt-in because nextest's post-`--`
          argument semantics differ from `cargo test`.
        type: boolean
        default: false
      sccache:
        description: "Enable sccache compiler caching (S3 backend)"
        type: boolean
        default: false
      sccache-bucket:
        description: "S3 bucket name for the sccache backend"
        type: string
        default: ""
      sccache-region:
        description: "AWS region of the sccache bucket"
        type: string
        default: "us-east-1"
      sccache-role-arn:
        description: "IAM role ARN assumed via OIDC for sccache S3 access"
        type: string
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      # Only used when `sccache` + `sccache-role-arn` are set, to mint an
      # OIDC token for the S3 cache backend. No-op otherwise.
      id-token: write
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Configure AWS credentials for sccache
        if: ${{ inputs.sccache && inputs.sccache-role-arn != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ inputs.sccache-role-arn }}
          aws-region: ${{ inputs.sccache-region }}

      - name: Set up sccache
        if: ${{ inputs.sccache }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable sccache
        if: ${{ inputs.sccache }}
        env:
          SCCACHE_BUCKET: ${{ inputs.sccache-bucket }}
          SCCACHE_REGION: ${{ inputs.sccache-region }}
          SCCACHE_S3_KEY_PREFIX: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CARGO_INCREMENTAL=0"
            echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
            echo "SCCACHE_REGION=${SCCACHE_REGION}"
            echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX}"
          } >> "$GITHUB_ENV"

      - name: Install cargo-nextest
        if: ${{ inputs.nextest }}
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-nextest

      - name: Run tests (nextest + doctests)
        if: ${{ inputs.nextest }}
        env:
          TEST_ARGS: ${{ inputs.test-args }}
        run: |
          set -euo pipefail
          read -r -a test_args_arr <<< "${TEST_ARGS:-}"
          cargo nextest run "${test_args_arr[@]}"
          # nextest does not run doctests; run them separately so coverage of
          # `///` examples is preserved.
          cargo test --doc "${test_args_arr[@]}"

      - name: Run tests (cargo test)
        if: ${{ !inputs.nextest }}
        env:
          TEST_ARGS: ${{ inputs.test-args }}
        run: |
          set -euo pipefail
          read -r -a test_args_arr <<< "${TEST_ARGS:-}"
          cargo test "${test_args_arr[@]}"

      - name: sccache stats
        if: ${{ inputs.sccache }}
        run: sccache --show-stats
