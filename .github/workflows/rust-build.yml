name: Rust Matrix Build

on:
  workflow_call:
    inputs:
      rust-versions:
        description: "JSON array of Rust toolchain versions to build against"
        type: string
        default: '["stable","1.88.0"]'
      os-list:
        description: "JSON array of runner OS labels to build on"
        type: string
        default: '["ubuntu-latest"]'
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      build-args:
        description: "Extra arguments passed to cargo build"
        type: string
        default: "--release"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: ${{ fromJson(inputs.rust-versions) }}
        os: ${{ fromJson(inputs.os-list) }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ matrix.rust }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Build
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          set -euo pipefail
          read -r -a build_args_arr <<< "${BUILD_ARGS:-}"
          cargo build "${build_args_arr[@]}"
