name: Rust Matrix Build

on:
  workflow_call:
    inputs:
      rust-versions:
        description: "JSON array of Rust toolchain versions to build against"
        type: string
        default: '["stable","1.88.0"]'
      os-list:
        description: "JSON array of runner OS labels to build on"
        type: string
        # COST GUARD: default is Linux-only. macOS Actions minutes bill 10x;
        # callers opt in by passing os-list (e.g. a manual workflow_dispatch).
        # Do NOT add "macos-latest" to this default — it hits every caller's
        # push/PR flow at 10x (CI cost incident 2026-06).
        default: '["ubuntu-latest"]'
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      cargo-args:
        description: >-
          Package-selection args placed BEFORE build-args (e.g. "-p crate" or
          "--workspace"). Used to scope the build to affected crates via
          rust-affected.yml's cargo-args output. Empty = whatever build-args
          specifies.
        type: string
        default: ""
      build-args:
        description: "Extra arguments passed to cargo build"
        type: string
        default: "--release"
      build-wrapper:
        description: >-
          Optional command prefix wrapping the `cargo build` invocation, e.g.
          "buildguard run --profile rust --no-slot --" to confine the build in
          a memory-limited cgroup on a memory-constrained self-hosted runner.
          Empty (default) runs cargo directly, so GitHub-hosted callers are
          unaffected. The wrapper binary must already exist on the runner. See
          ffreis-home-infra ansible/roles/gha_runner/README.md "buildguard".
        type: string
        default: ""
      sccache:
        description: "Enable sccache compiler caching (S3 backend)"
        type: boolean
        default: false
      sccache-bucket:
        description: "S3 bucket name for the sccache backend"
        type: string
        default: ""
      sccache-region:
        description: "AWS region of the sccache bucket"
        type: string
        default: "us-east-1"
      sccache-role-arn:
        description: "IAM role ARN assumed via OIDC for sccache S3 access"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      cargo-build-jobs:
        description: >-
          Caps CARGO_BUILD_JOBS (parallel rustc compile units). Default "4"
          matches the workspace Makefile convention — memory-safe on a
          4.5Gi-limited self-hosted runner pod. Hosted-runner callers wanting
          full parallelism can pass a higher value (e.g. the runner's core
          count).
        type: string
        default: "4"
    secrets:
      PRIVATE_DEPS_TOKEN:
        description: "Token with read access to private git-dependency repos (e.g. FLEET_READ_TOKEN). Optional — omit if the workspace has no private cargo git deps."
        required: false

jobs:
  build:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
      # Only used when `sccache` + `sccache-role-arn` are set, to mint an
      # OIDC token for the S3 cache backend. No-op otherwise.
      id-token: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: ${{ fromJson(inputs.rust-versions) }}
        os: ${{ fromJson(inputs.os-list) }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    env:
      CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure git for private cargo dependencies
        env:
          PRIVATE_DEPS_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "$PRIVATE_DEPS_TOKEN" ]]; then
            git config --global url."https://x-access-token:${PRIVATE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"
            # cargo's libgit2 backend does not reliably honor url.insteadOf
            # credential rewriting; force it to shell out to system git,
            # which does.
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ matrix.rust }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Configure AWS credentials for sccache
        if: ${{ inputs.sccache && inputs.sccache-role-arn != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ inputs.sccache-role-arn }}
          aws-region: ${{ inputs.sccache-region }}

      - name: Set up sccache
        if: ${{ inputs.sccache }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable sccache
        if: ${{ inputs.sccache }}
        env:
          SCCACHE_BUCKET: ${{ inputs.sccache-bucket }}
          SCCACHE_REGION: ${{ inputs.sccache-region }}
          SCCACHE_S3_KEY_PREFIX: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CARGO_INCREMENTAL=0"
            echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
            echo "SCCACHE_REGION=${SCCACHE_REGION}"
            echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX}"
          } >> "$GITHUB_ENV"

      - name: Build
        env:
          CARGO_ARGS: ${{ inputs.cargo-args }}
          BUILD_ARGS: ${{ inputs.build-args }}
          BUILD_WRAPPER: ${{ inputs.build-wrapper }}
        run: |
          set -euo pipefail
          read -r -a cargo_args_arr <<< "${CARGO_ARGS:-}"
          read -r -a build_args_arr <<< "${BUILD_ARGS:-}"
          read -r -a wrapper_arr <<< "${BUILD_WRAPPER:-}"
          # Library crates in this fleet gitignore Cargo.lock (only
          # binaries/Lambdas commit it); only pass --locked when one exists so
          # library repos don't fail resolving a lockfile that was never
          # committed.
          locked_arr=()
          [ -f Cargo.lock ] && locked_arr=("--locked")
          # A build-wrapper (e.g. buildguard) confines the compile in a
          # memory-limited cgroup on a constrained self-hosted runner; empty
          # by default so GitHub-hosted builds run cargo directly.
          if [[ ${#wrapper_arr[@]} -gt 0 ]]; then
            "${wrapper_arr[@]}" cargo build "${locked_arr[@]}" "${cargo_args_arr[@]}" "${build_args_arr[@]}"
          else
            cargo build "${locked_arr[@]}" "${cargo_args_arr[@]}" "${build_args_arr[@]}"
          fi

      - name: sccache stats
        if: ${{ inputs.sccache }}
        run: sccache --show-stats
