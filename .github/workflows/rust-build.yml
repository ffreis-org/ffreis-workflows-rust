name: Rust Matrix Build

on:
  workflow_call:
    inputs:
      rust-versions:
        description: "JSON array of Rust toolchain versions to build against"
        type: string
        default: '["stable","1.88.0"]'
      os-list:
        description: "JSON array of runner OS labels to build on"
        type: string
        # COST GUARD: default is Linux-only. macOS Actions minutes bill 10x;
        # callers opt in by passing os-list (e.g. a manual workflow_dispatch).
        # Do NOT add "macos-latest" to this default — it hits every caller's
        # push/PR flow at 10x (CI cost incident 2026-06).
        default: '["ubuntu-latest"]'
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      build-args:
        description: "Extra arguments passed to cargo build"
        type: string
        default: "--release"
      sccache:
        description: "Enable sccache compiler caching (S3 backend)"
        type: boolean
        default: false
      sccache-bucket:
        description: "S3 bucket name for the sccache backend"
        type: string
        default: ""
      sccache-region:
        description: "AWS region of the sccache bucket"
        type: string
        default: "us-east-1"
      sccache-role-arn:
        description: "IAM role ARN assumed via OIDC for sccache S3 access"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
      # Only used when `sccache` + `sccache-role-arn` are set, to mint an
      # OIDC token for the S3 cache backend. No-op otherwise.
      id-token: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: ${{ fromJson(inputs.rust-versions) }}
        os: ${{ fromJson(inputs.os-list) }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ matrix.rust }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Configure AWS credentials for sccache
        if: ${{ inputs.sccache && inputs.sccache-role-arn != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ inputs.sccache-role-arn }}
          aws-region: ${{ inputs.sccache-region }}

      - name: Set up sccache
        if: ${{ inputs.sccache }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Enable sccache
        if: ${{ inputs.sccache }}
        env:
          SCCACHE_BUCKET: ${{ inputs.sccache-bucket }}
          SCCACHE_REGION: ${{ inputs.sccache-region }}
          SCCACHE_S3_KEY_PREFIX: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "RUSTC_WRAPPER=sccache"
            echo "CARGO_INCREMENTAL=0"
            echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
            echo "SCCACHE_REGION=${SCCACHE_REGION}"
            echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX}"
          } >> "$GITHUB_ENV"

      - name: Build
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          set -euo pipefail
          read -r -a build_args_arr <<< "${BUILD_ARGS:-}"
          cargo build "${build_args_arr[@]}"

      - name: sccache stats
        if: ${{ inputs.sccache }}
        run: sccache --show-stats
