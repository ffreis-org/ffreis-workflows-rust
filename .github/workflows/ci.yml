name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write
  issues: write
  pull-requests: write

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# rust-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# rust-coverage requires CODECOV_TOKEN to be configured for push events;
# when the token is missing, coverage runs on push will fail rather than
# silently skipping the upload. Ensure CODECOV_TOKEN is set in repository
# or organization secrets before enabling this self-test workflow.
#
# rust-miri uses --lib to avoid compiling the Criterion benchmark harness
# under Miri (Criterion uses features incompatible with the Miri interpreter).

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-fmt.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  lint:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-lint.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  test:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-test.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  build:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-build.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  docs:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-docs.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  security:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-security.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  deny:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-deny.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  coverage:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-coverage.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  bench:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-bench.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  msrv:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-msrv.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      msrv: "1.88.0"
      working-directory: examples/hello

  miri:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-miri.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello
      miri-args: --lib

  mutation:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-mutation.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello
      threshold: 50

  semgrep:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-semgrep.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello

  sonar:
    if: vars.SONAR_ENABLED == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-sonar.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    uses: FelipeFuhr/ffreis-workflows-rust/.github/workflows/rust-container.yml@f762609c3cd6d1317867a7504445385910d6f16a # main
    with:
      image-name: hello-example
      context: examples/hello
