name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# rust-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# rust-coverage requires CODECOV_TOKEN to be configured for push events;
# when the token is missing, coverage runs on push will fail rather than
# silently skipping the upload. Ensure CODECOV_TOKEN is set in repository
# or organization secrets before enabling this self-test workflow.
#
# rust-miri uses --lib to avoid compiling the Criterion benchmark harness
# under Miri (Criterion uses features incompatible with the Miri interpreter).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path

  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-lint.yml
    with:
      working-directory: examples/hello

  test:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: ./.github/workflows/rust-test.yml
    with:
      working-directory: examples/hello

  build:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-build.yml
    with:
      working-directory: examples/hello

  docs:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-docs.yml
    with:
      working-directory: examples/hello

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-security.yml
    with:
      working-directory: examples/hello

  deny:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-deny.yml
    with:
      working-directory: examples/hello

  coverage:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: ./.github/workflows/rust-coverage.yml
    with:
      working-directory: examples/hello

  bench:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: ./.github/workflows/rust-bench.yml
    with:
      working-directory: examples/hello

  msrv:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-msrv.yml
    with:
      msrv: "1.88.0"
      working-directory: examples/hello

  miri:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-miri.yml
    with:
      working-directory: examples/hello
      miri-args: --lib

  mutation:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
    uses: ./.github/workflows/rust-mutation.yml
    with:
      working-directory: examples/hello
      threshold: 50

  semgrep:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-semgrep.yml
    with:
      working-directory: examples/hello

  sonar:
    if: vars.SONAR_ENABLED == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    permissions:
      contents: read
    uses: ./.github/workflows/rust-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-container.yml
    with:
      image-name: hello-example
      context: examples/hello
