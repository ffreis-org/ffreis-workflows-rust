name: Self Test

on:
  push:
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# rust-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# rust-coverage requires CODECOV_TOKEN to be configured for push events;
# when the token is missing, coverage runs on push will fail rather than
# silently skipping the upload. Ensure CODECOV_TOKEN is set in repository
# or organization secrets before enabling this self-test workflow.
#
# rust-miri uses --lib to avoid compiling the Criterion benchmark harness
# under Miri (Criterion uses features incompatible with the Miri interpreter).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3

  codeql-actions:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@ef5f76c297dba0d2990210a905d045c826092427 # v1.4.3
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-lint.yml
    with:
      working-directory: examples/hello

  quick-checks:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/rust-quick-checks.yml
    with:
      working-directory: examples/hello

  affected:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-affected.yml
    with:
      working-directory: examples/hello

  test:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-test.yml
    with:
      working-directory: examples/hello
      # Exercise the nextest path (incl. the separate doctest run) so a
      # regression in that branch breaks self-test, not a downstream caller.
      nextest: true

  build:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-build.yml
    with:
      working-directory: examples/hello

  docs:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-docs.yml
    with:
      working-directory: examples/hello

  security:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-security.yml
    with:
      working-directory: examples/hello

  deny:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-deny.yml
    with:
      working-directory: examples/hello

  coverage:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-coverage.yml
    with:
      working-directory: examples/hello
      # examples/hello is a 187-LOC validator with comprehensive tests;
      # it should comfortably exceed 80. Gating here exercises the
      # coverage-threshold input itself so a regression in that input
      # would break self-test instead of silently shipping to downstream
      # callers.
      coverage-threshold: 80

  bench:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-bench.yml
    with:
      working-directory: examples/hello

  msrv:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-msrv.yml
    with:
      msrv: "1.88.0"
      working-directory: examples/hello

  miri:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-miri.yml
    with:
      working-directory: examples/hello
      miri-args: --lib

  mutation:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-mutation.yml
    with:
      working-directory: examples/hello
      # examples/hello is small enough that mutation should easily exceed
      # 80; the previous 50 was too permissive to detect regressions in
      # the mutation gating logic itself.
      threshold: 80

  proptest:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-proptest.yml
    with:
      working-directory: examples/hello
      # Low case count for the self-test (examples/hello has no real
      # property tests yet — the workflow emits a warning + skips if it
      # finds no proptest! macros, so this is mostly testing the workflow
      # plumbing itself).
      proptest-cases: 256
      timeout-minutes: 10

  semgrep:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-semgrep.yml
    with:
      working-directory: examples/hello

  sonar:
    if: vars.SONAR_ENABLED == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    permissions:
      contents: read
    uses: ./.github/workflows/rust-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-container.yml
    with:
      image-name: hello-example
      context: examples/hello
