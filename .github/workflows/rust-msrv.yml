name: Rust MSRV Check

on:
  workflow_call:
    inputs:
      msrv:
        description: "Minimum Supported Rust Version to compile against (e.g. '1.80.0')"
        type: string
        required: true
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      build-args:
        description: "Extra arguments passed to cargo build"
        type: string
        default: "--all-features"
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'

jobs:
  msrv:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.msrv }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Compile check (MSRV)
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
        run: |
          set -euo pipefail
          read -r -a build_args_arr <<< "${BUILD_ARGS:-}"
          cargo build --locked "${build_args_arr[@]}"

      - name: Test compile check (MSRV)
        run: |
          set -euo pipefail
          cargo test --all-features --no-run
