name: Rust Benchmarks (Criterion)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      bench-args:
        description: "Extra arguments passed to cargo bench"
        type: string
        default: "--all-features"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 90
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      PRIVATE_DEPS_TOKEN:
        description: "Token with read access to private git-dependency repos (e.g. FLEET_READ_TOKEN). Optional — omit if the workspace has no private cargo git deps."
        required: false

jobs:
  bench:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ${{ fromJson(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Configure git for private cargo dependencies
        env:
          PRIVATE_DEPS_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "$PRIVATE_DEPS_TOKEN" ]]; then
            git config --global url."https://x-access-token:${PRIVATE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"
            # cargo's libgit2 backend does not reliably honor url.insteadOf
            # credential rewriting; force it to shell out to system git,
            # which does.
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Run benchmarks
        env:
          BENCH_ARGS: ${{ inputs.bench-args }}
        run: |
          set -euo pipefail
          read -r -a bench_args_arr <<< "${BENCH_ARGS:-}"
          cargo bench "${bench_args_arr[@]}"

      - name: Upload Criterion results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: criterion-results
          path: ${{ inputs.working-directory }}/target/criterion
          if-no-files-found: warn
          retention-days: 14
