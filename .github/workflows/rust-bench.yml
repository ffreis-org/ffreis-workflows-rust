name: Rust Benchmarks (Criterion)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      bench-args:
        description: "Extra arguments passed to cargo bench"
        type: string
        default: "--all-features"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 90

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Run benchmarks
        env:
          BENCH_ARGS: ${{ inputs.bench-args }}
        run: |
          set -euo pipefail
          read -r -a bench_args_arr <<< "${BENCH_ARGS:-}"
          cargo bench "${bench_args_arr[@]}"

      - name: Upload Criterion results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: criterion-results
          path: ${{ inputs.working-directory }}/target/criterion
          if-no-files-found: warn
          retention-days: 30
