name: DevOps / Automation

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      only: "both"

  release-please:
    if: vars.RELEASE_PLEASE_ENABLED == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@9122525162705ed0676ed066e788f2e531a25bea # v1.0.0
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
