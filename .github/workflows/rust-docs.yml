name: Rust Docs (rustdoc)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      doc-args:
        description: "Extra arguments passed to cargo doc"
        type: string
        default: "--no-deps --all-features"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
          DOC_ARGS: ${{ inputs.doc-args }}
        run: |
          set -euo pipefail
          read -r -a doc_args_arr <<< "${DOC_ARGS:-}"
          cargo doc "${doc_args_arr[@]}"
