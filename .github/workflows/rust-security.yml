name: Rust Security (cargo-audit)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      ignore-advisories:
        description: "Space-separated RUSTSEC IDs to ignore (e.g. 'RUSTSEC-2024-0001 RUSTSEC-2024-0002')"
        type: string
        default: ""
      run_on_draft:
        description: "Run even on draft PRs (default: skip on draft to save CI minutes)"
        required: false
        type: boolean
        default: false
      runner:
        description: |
          JSON-encoded runner label(s). Default: GitHub-hosted ubuntu-latest.
          Self-hosted homelab box (private repos only): '["self-hosted","local"]'
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      PRIVATE_DEPS_TOKEN:
        description: "Token with read access to private git-dependency repos (e.g. FLEET_READ_TOKEN). Optional — omit if the workspace has no private cargo git deps."
        required: false

jobs:
  audit:
    if: ${{ inputs.run_on_draft || vars.CI_RUN_ON_DRAFT == 'true' || github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ${{ fromJson(inputs.runner) }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure git for private cargo dependencies
        env:
          PRIVATE_DEPS_TOKEN: ${{ secrets.PRIVATE_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "$PRIVATE_DEPS_TOKEN" ]]; then
            git config --global url."https://x-access-token:${PRIVATE_DEPS_TOKEN}@github.com/".insteadOf "https://github.com/"
            # cargo's libgit2 backend does not reliably honor url.insteadOf
            # credential rewriting; force it to shell out to system git,
            # which does.
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install cargo-audit
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked

      - name: Run cargo audit
        env:
          IGNORE_ADVISORIES: ${{ inputs.ignore-advisories }}
        run: |
          set -euo pipefail
          read -r -a ignore_ids_arr <<< "${IGNORE_ADVISORIES:-}"
          ignore_flags_arr=()
          for id in "${ignore_ids_arr[@]}"; do
            [[ -n "$id" ]] || continue
            ignore_flags_arr+=(--ignore "$id")
          done
          cargo audit "${ignore_flags_arr[@]}"
