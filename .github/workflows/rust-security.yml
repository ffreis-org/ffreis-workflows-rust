name: Rust Security (cargo-audit)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      ignore-advisories:
        description: "Space-separated RUSTSEC IDs to ignore (e.g. 'RUSTSEC-2024-0001 RUSTSEC-2024-0002')"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install cargo-audit
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked

      - name: Run cargo audit
        env:
          IGNORE_ADVISORIES: ${{ inputs.ignore-advisories }}
        run: |
          set -euo pipefail
          read -r -a ignore_ids_arr <<< "${IGNORE_ADVISORIES:-}"
          ignore_flags_arr=()
          for id in "${ignore_ids_arr[@]}"; do
            [[ -n "$id" ]] || continue
            ignore_flags_arr+=(--ignore "$id")
          done
          cargo audit "${ignore_flags_arr[@]}"
